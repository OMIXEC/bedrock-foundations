AWSTemplateFormatVersion: '2010-09-09'
Description: API Gateway, Lambda Authorizer, Main Lambda Function interacting with Amazon Bedrock model

Parameters:
  AuthorizationTokenName: 
    Type: String
    Default: 'AuthorizationLambdaToken'
  BedrockModelId:
    Type: String
    Default: 'amazon.titan-text-express-v1'
  LambdaLayerVersionArn:
    Type: String
    Default: 'arn:aws:lambda:<region>:<account_id>:layer:aws-xray-sdk-layer:<version_number>'
  StageName:
    Type: String
    Default: 'dev'
    Description: 'Stage name for the API Gateway'

Resources:
#####################################
# Authorizer Lambda Function
#####################################
  AuthorizationLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: AuthorizationLambdaFunction
      Description: Lambda Authorizer for API Gateway
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt AuthorizationLambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      TracingConfig:
        Mode: Active
      Layers:
        - !Ref LambdaLayerVersionArn
      Environment:
        Variables:
          AuthorizationTokenName: !Ref AuthorizationTokenName
      Code:
        ZipFile: |
          import boto3
          from botocore.exceptions import ClientError
          import json
          import os
          import logging
          from aws_xray_sdk.core import patch_all, xray_recorder

          # Initialize logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          # Initialize the X-Ray SDK
          patch_all()

          def lambda_handler(event, context):
              logger.info(f"Received event: {json.dumps(event)}")

              parameter_name = os.environ['AuthorizationTokenName']
              region_name = context.invoked_function_arn.split(":")[3]

              try:
                  # Create a subsegment for the SSM client interaction
                  with xray_recorder.in_subsegment('SSM GetParameter') as subsegment:
                      # Create a SSM client
                      session = boto3.session.Session()
                      client = session.client(
                          service_name='ssm',
                          region_name=region_name
                      )
                      get_parameter_response = client.get_parameter(
                          Name=parameter_name,
                          WithDecryption=True
                      )
                      secret_token = get_parameter_response['Parameter']['Value']

                      # Determine the type of authorization request and extract the token
                      authorization_token = None
                      if event['type'] == 'TOKEN':
                          authorization_token = event.get('authorizationToken')
                      elif event['type'] == 'REQUEST':
                          authorization_token = event['headers'].get('Authorization')

                      if not authorization_token:
                          logger.error('Authorization token is missing or malformed')
                          return generate_policy('user', 'Deny', event['methodArn'])

                      # Remove the "Bearer " prefix if it exists
                      if authorization_token.lower().startswith('bearer '):
                          authorization_token = authorization_token[7:]

                      # Check if the provided token matches the secret_token
                      is_authorized = authorization_token == secret_token

                      # Construct the response
                      effect = 'Allow' if is_authorized else 'Deny'
                      return generate_policy('user', effect, event['methodArn'])
              except ClientError as e:
                  logger.error(f"Error retrieving parameter: {e}")
                  return generate_policy('user', 'Deny', event['methodArn'])

          def generate_policy(principal_id, effect, resource):
              """Generate a policy document"""
              auth_response = {
                  "principalId": principal_id,
                  "policyDocument": {
                      "Version": "2012-10-17",
                      "Statement": []
                  }
              }
              if effect and resource:
                  auth_response['policyDocument']['Statement'].append({
                      "Action": "execute-api:Invoke",
                      "Effect": effect,
                      "Resource": resource
                  })
              return auth_response

  AuthorizationLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AuthorizationLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SSMParameterStoreAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AuthorizationTokenName}
        - PolicyName: ApiGatewayInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - execute-api:Invoke
                Resource:
                  - !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApiGateway}/*/*/invoke
        - PolicyName: XRayAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - xray:PutTelemetryRecords
                  - xray:PutAnnotation
                  - xray:PutTraceSegments
                Resource: '*'

#####################################
# Main Lambda Function 
# makes requests to Bedrock model
#####################################
  MainLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: MainLambdaFunction
      Description: Make requests to Bedrock models
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt MainLambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      TracingConfig:
        Mode: Active
      Layers:
        - !Ref LambdaLayerVersionArn
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          import logging
          from botocore.exceptions import ClientError
          from aws_xray_sdk.core import patch_all, xray_recorder

          # Initialize logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          # Initialize the X-Ray SDK
          patch_all()

          # Initialize the Bedrock Runtime client
          bedrock_runtime = boto3.client('bedrock-runtime')

          def lambda_handler(event, context):
              try:
                  # Retrieve the model ID from environment variables
                  model_id = os.environ['BEDROCK_MODEL_ID']

                  # Validate the input
                  input_text = event.get("queryStringParameters", {}).get("inputText")
                  if not input_text:
                      logger.error('Input text is missing in the request')
                      raise ValueError("Input text is required in the request query parameters.")

                  # Prepare the payload for invoking the Bedrock model
                  payload = json.dumps({
                      "inputText": input_text,
                      "textGenerationConfig": {
                          "maxTokenCount": 8192,
                          "stopSequences": [],
                          "temperature": 0,
                          "topP": 1
                      }
                  })

                  logger.info('Payload for Bedrock model: %s', payload)

                  # Create a subsegment for the Bedrock model invocation
                  with xray_recorder.in_subsegment('Bedrock InvokeModel') as subsegment:
                      # Invoke the Bedrock model
                      response = bedrock_runtime.invoke_model(
                          modelId=model_id,
                          contentType="application/json",
                          accept="application/json",
                          body=payload
                      )

                      logger.info('Response from Bedrock model: %s', response)

                      # Check if the 'body' exists in the response and handle it correctly
                      if 'body' not in response or not response['body']:
                          logger.error('Response body is empty')
                          raise ValueError("Response body is empty.")

                      # Read and process the response
                      response_body = json.loads(response['body'].read().decode('utf-8'))
                      logger.info('Processed response body: %s', response_body)

                      return {
                          'statusCode': 200,
                          'body': json.dumps(response_body)
                      }

              except ClientError as e:
                  logger.error('ClientError: %s', e)
                  return {
                      'statusCode': 500,
                      'body': json.dumps({"error": "Error interacting with the Bedrock API"})
                  }
              except ValueError as e:
                  logger.error('ValueError: %s', e)
                  return {
                      'statusCode': 400,
                      'body': json.dumps({"error": str(e)})
                  }
              except Exception as e:
                  logger.error('Exception: %s', e)
                  return {
                      'statusCode': 500,
                      'body': json.dumps({"error": "Internal Server Error"})
                  }

  MainLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: MainLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:ListFoundationModels
                Resource: '*'
        - PolicyName: XRayAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - xray:PutTelemetryRecords
                  - xray:PutAnnotation
                  - xray:PutTraceSegments
                Resource: '*'

#####################################
# API Gateway
#####################################
  # REST API
  RestApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: RestApi4328
      FailOnWarnings: true

  # REST API Gateway Authorizer
  ApiGatewayAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: LambdaAuthorizer
      Type: TOKEN
      IdentitySource: method.request.header.Authorization
      RestApiId: !Ref RestApiGateway
      AuthorizerUri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthorizationLambdaFunction.Arn}/invocations
      AuthorizerResultTtlInSeconds: 300

  # IAM role for API Gateway to invoke Lambda functions
  ApiGatewayInvokeLambdaRole:
    Type: AWS::IAM::Role
    DependsOn:
      - AuthorizationLambdaFunction
      - MainLambdaFunction
    Properties:
      RoleName: ApiGatewayInvokeLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: AuthorizerPermissionsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                  - sts:AssumeRole
                Resource:
                  - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${AuthorizationLambdaFunction}
              - Effect: Allow
                Action:
                  - execute-api:Invoke
                Resource:
                  - !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApiGateway}/*/*/invoke

  ApiGatewayLogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ApiGatewayLogRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  # REST API Gateway Stage
  ApiGatewayStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: !Ref StageName
      RestApiId: !Ref RestApiGateway
      DeploymentId: !Ref ApiGatewayDeployment
      TracingEnabled: true
      MethodSettings:
        - DataTraceEnabled: true
          HttpMethod: "*"
          LoggingLevel: INFO
          ResourcePath: "/*"
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGatewayLogGroup.Arn
        Format: '{ "requestId":"$context.requestId", "ip": "$context.identity.sourceIp", "caller": "$context.identity.caller", "user": "$context.identity.user", "requestTime": "$context.requestTime", "httpMethod": "$context.httpMethod", "resourcePath": "$context.resourcePath", "status": "$context.status", "protocol": "$context.protocol", "responseLength": "$context.responseLength" }'
      Variables:
        AuthorizationTokenName: !Ref AuthorizationTokenName

  # log group for API Gateway access logs
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/apigateway/${RestApiGateway}
      RetentionInDays: 7

  # resource for the REST API Gateway
  ApiGatewayResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt RestApiGateway.RootResourceId
      PathPart: invoke
      RestApiId: !Ref RestApiGateway

  # REST API Gateway Method
  ApiGatewayMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApiGateway
      ResourceId: !Ref ApiGatewayResource
      HttpMethod: ANY
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref ApiGatewayAuthorizer
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MainLambdaFunction.Arn}/invocations

  # deployment for REST API Gateway
  ApiGatewayDeployment:
    DependsOn:
      - ApiGatewayMethod
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref RestApiGateway

  # Lambda function invoke permission for API Gateway
  MainLambdaInvokePermissionRestApi:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt MainLambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApiGateway}/*/*/invoke

  # Lambda function invoke permission for API Gateway
  AuthorizationLambdaInvokePermissionRestApi:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt AuthorizationLambdaFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApiGateway}/*