# Customer Support RAG - Pytest Configuration

[pytest]
markers =
    unit: Unit tests with mocked AWS services (fast, no costs)
    integration: Integration tests with real AWS APIs (slower, incurs costs)
    load: Load and performance tests (run on dedicated test environment)

testpaths = tests
addopts = --strict-markers -v

# Coverage configuration (uncomment to enforce 80% coverage)
# addopts = --strict-markers -v --cov=src --cov-report=html --cov-report=term-missing --cov-fail-under=80
#
# Run examples:
# pytest -m unit                    # Fast unit tests only (use mocks)
# pytest -m integration             # Integration tests (real AWS APIs, costs money)
# pytest -m "unit or integration"   # All functional tests
# pytest -m load                    # Load tests (use dedicated environment)
# pytest --cov=src --cov-report=html # Generate coverage report
